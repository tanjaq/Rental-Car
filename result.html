<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .car-container {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .car-item {
            width: 45%;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .car-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .car-price {
            font-size: 16px;
            color: #007bff;
        }
    </style>
</head>

<body>
    <ul class="car-container">
        <li class="car-item">
            <div class="car-name">Car Name</div>
            <div class="car-price">Price: $0 per day</div>
        </li>
    </ul>
</body>

</html>
