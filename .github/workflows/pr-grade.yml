name: PR Checks

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-clean-code:
    name: Lint Clean Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch (submitted code)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install lint toolchain
        run: npm install --no-save eslint@8 eslint-config-airbnb-base eslint-plugin-import

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: |
          npx --yes eslint@8 . --max-warnings=0 --rule 'camelcase:["error",{"properties":"always"}]' 2>&1 | tee /tmp/lint-output.txt
          exit ${PIPESTATUS[0]}

      - name: Read lint output
        id: lint_output
        if: always()
        run: |
          OUTPUT=$(head -60 /tmp/lint-output.txt 2>/dev/null || echo "No output captured")
          echo "text<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment lint result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- lint-check -->';
            const ok = '${{ steps.lint.outcome }}' === 'success';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const checksUrl = '${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/checks';
            const lintOutput = `${{ steps.lint_output.outputs.text }}`;
            const lines = [
              marker,
              '### Lint / Clean Code',
              '**Purpose:** Verify naming conventions and clean-code style rules with ESLint.',
              `**Status:** ${ok ? '✅ PASS' : '❌ FAIL'}`,
              `**Run details:** ${runUrl}`,
              `**PR checks:** ${checksUrl}`,
            ];
            if (!ok) {
              lines.push('**Errors:**');
              lines.push('```');
              lines.push(lintOutput);
              lines.push('```');
            }
            const body = lines.join('\n');

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.filter(c => (c.body || '').includes(marker)).pop();
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Set lint job status
        if: always()
        run: |
          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "Lint check failed."
            exit 1
          fi

  tests-and-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch (submitted code)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        id: repo_tests
        continue-on-error: true
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test -- --runInBand --coverage --coverageReporters=json-summary --coverageReporters=text
          else
            npx jest --runInBand --coverage --coverageReporters=json-summary --coverageReporters=text
          fi

      - name: Enforce global 100% coverage
        id: coverage_gate
        continue-on-error: true
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const p = 'coverage/coverage-summary.json';
          if (!fs.existsSync(p)) {
            console.error('coverage-summary.json not found');
            process.exit(1);
          }
          const s = JSON.parse(fs.readFileSync(p, 'utf8')).total;
          const keys = ['lines', 'statements', 'functions', 'branches'];
          const bad = keys.filter((k) => s[k].pct < 100);
          if (bad.length) {
            console.error(
              'Coverage below 100% for:',
              bad.map((k) => `${k}=${s[k].pct}%`).join(', ')
            );
            process.exit(1);
          }
          console.log('Coverage OK:', keys.map((k) => `${k}=${s[k].pct}%`).join(', '));
          NODE

      - name: Read coverage numbers
        id: coverage_values
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              console.log('lines=' + s.lines.pct);
              console.log('statements=' + s.statements.pct);
              console.log('functions=' + s.functions.pct);
              console.log('branches=' + s.branches.pct);
            " >> "$GITHUB_OUTPUT"
          else
            echo "lines=n/a" >> "$GITHUB_OUTPUT"
            echo "statements=n/a" >> "$GITHUB_OUTPUT"
            echo "functions=n/a" >> "$GITHUB_OUTPUT"
            echo "branches=n/a" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment test/coverage result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- test-coverage-check -->';
            const testsOk = '${{ steps.repo_tests.outcome }}' === 'success';
            const coverageOk = '${{ steps.coverage_gate.outcome }}' === 'success';
            const allOk = testsOk && coverageOk;
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const checksUrl = '${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/checks';
            const lines = [
              marker,
              '### Test Coverage',
              '**Purpose:** Run project tests and check 100% test coverage.',
              `**Status:** ${allOk ? '✅ PASS' : '❌ FAIL'}`,
              `**Tests:** ${testsOk ? '✅ PASS' : '❌ FAIL'}`,
              `**Coverage:** lines=${{ steps.coverage_values.outputs.lines }}% | statements=${{ steps.coverage_values.outputs.statements }}% | functions=${{ steps.coverage_values.outputs.functions }}% | branches=${{ steps.coverage_values.outputs.branches }}%`,
              `**Run details:** ${runUrl}`,
              `**PR checks:** ${checksUrl}`,
            ];
            if (!allOk) {
              lines.push('**Where to look:** Inspect `Run tests with coverage` and `Enforce global 100% coverage` step logs in this run.');
            }
            const body = lines.join('\n');

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.filter(c => (c.body || '').includes(marker)).pop();
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Set tests/coverage job status
        if: always()
        run: |
          if [ "${{ steps.repo_tests.outcome }}" != "success" ] || [ "${{ steps.coverage_gate.outcome }}" != "success" ]; then
            echo "Repository tests and/or coverage check failed."
            exit 1
          fi

  teacher-tests:
    name: Functional Requirements Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch (submitted code)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Load functional requirement tests
        run: |
          if ! git fetch --depth=1 "https://github.com/${{ github.repository }}.git" teacher-tests 2>/dev/null; then
            echo "::warning::teacher-tests branch not found — skipping functional tests"
            exit 0
          fi
          mapfile -t test_files < <(git ls-tree -r --name-only FETCH_HEAD | grep -E '\.test\.js$' || true)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "::warning::No functional test files found on teacher-tests branch — skipping"
            exit 0
          fi
          for file in "${test_files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "FETCH_HEAD:$file" > "$file"
          done

      - name: Normalize price function signature
        run: |
          node - <<'NODE'
          const fs = require('fs');
          if (!fs.existsSync('./rentalPrice.js')) {
            console.log('rentalPrice.js not found — skipping adapter');
            process.exit(0);
          }

          let orig;
          try { orig = require('./rentalPrice'); } catch (e) {
            console.log('Could not require rentalPrice.js — skipping adapter');
            process.exit(0);
          }

          const exportName = typeof orig.price === 'function' ? 'price' : 'calculatePrice';
          const origFn = orig[exportName];
          if (typeof origFn !== 'function') {
            console.log('No price or calculatePrice export found — skipping adapter');
            process.exit(0);
          }
          console.log(`Found export: ${exportName}`);

          // Probe: call with the canonical signature and check known-good output.
          // Low season, 1 day, Compact, age 30, licenseYears 10 => $30
          // LY=10 ensures students who default undefined→0 don't get a license
          // error and a false probe miss.
          const PICKUP = 'A', DROPOFF = 'B';
          const PD = '2024-02-12', DD = '2024-02-12';
          const TYPE = 'Compact', AGE = 30, LY = 10;
          const EXPECTED = '$30';

          function probe(fn, args) {
            try { return fn(...args) === EXPECTED; } catch { return false; }
          }

          if (probe(origFn, [PICKUP, DROPOFF, PD, DD, TYPE, AGE, LY])) {
            console.log('Standard signature confirmed — no adapter needed');
            process.exit(0);
          }

          let adapterLines = null;

          // Case 1: location params (pickup, dropoff) removed — price(pickupDate, dropoffDate, type, age, ...)
          if (probe(origFn, [PD, DD, TYPE, AGE, LY])) {
            console.log('Detected: location params removed — injecting positional adapter');
            adapterLines = [
              "const s = require('./rentalPrice.student.js');",
              "const f = s." + exportName + ";",
              "function price(pickup, dropoff, pickupDate, dropoffDate, type, age, ...rest) {",
              "  return f(pickupDate, dropoffDate, type, age, ...rest);",
              "}",
              "module.exports = { ...s, price };",
            ];
          }

          // Case 2: object-style params — price({ pickup, dropoff, pickupDate, dropoffDate, type, age })
          if (!adapterLines && probe(origFn, [{ pickup: PICKUP, dropoff: DROPOFF, pickupDate: PD, dropoffDate: DD, type: TYPE, age: AGE, licenseYears: LY }])) {
            console.log('Detected: object-style params — injecting object adapter');
            adapterLines = [
              "const s = require('./rentalPrice.student.js');",
              "const f = s." + exportName + ";",
              "function price(pickup, dropoff, pickupDate, dropoffDate, type, age, licenseYears) {",
              "  return f({ pickup, dropoff, pickupDate, dropoffDate, type, age, licenseYears });",
              "}",
              "module.exports = { ...s, price };",
            ];
          }

          // Case 3: standard signature but exported as calculatePrice
          if (!adapterLines && exportName !== 'price') {
            if (probe(origFn, [PICKUP, DROPOFF, PD, DD, TYPE, AGE, LY])) {
              console.log('Detected: standard signature exported as calculatePrice — aliasing');
              adapterLines = [
                "const s = require('./rentalPrice.student.js');",
                "const price = s.calculatePrice;",
                "module.exports = { ...s, price };",
              ];
            }
          }

          if (!adapterLines) {
            console.log('Could not detect a compatible signature — running tests as-is');
            process.exit(0);
          }

          fs.renameSync('./rentalPrice.js', './rentalPrice.student.js');
          fs.writeFileSync('./rentalPrice.js', adapterLines.join('\n') + '\n');
          console.log('Adapter injected into rentalPrice.js');
          NODE

      - name: Run functional requirements tests
        id: teacher
        continue-on-error: true
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test -- --runInBand
          else
            npx jest --runInBand
          fi

      - name: Comment functional requirements result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- functional-requirements-check -->';
            const ok = '${{ steps.teacher.outcome }}' === 'success';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const checksUrl = '${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/checks';
            const lines = [
              marker,
              '### Functional Requirements Test',
              '**Purpose:** Validate expected functional requirements.',
              `**Status:** ${ok ? '✅ PASS' : '❌ FAIL'}`,
              `**Run details:** ${runUrl}`,
              `**PR checks:** ${checksUrl}`,
            ];
            if (!ok) {
              lines.push('**Where to look:** Inspect the `Run functional requirements tests` step log in this run.');
            }
            const body = lines.join('\n');

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.filter(c => (c.body || '').includes(marker)).pop();
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Set functional requirements status
        if: always()
        run: |
          if [ "${{ steps.teacher.outcome }}" != "success" ]; then
            echo "Functional requirements tests failed."
            exit 1
          fi
