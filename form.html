<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental Booking Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f4f4;
        }
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h1 class="mb-4 text-center">Car Rental Booking Form</h1>
        <form id="calcForm" method="post" action="/">
            <div class="form-group">
                <label for="pickup-location">Pickup Location</label>
                <input type="text" id="pickup-location" name="pickup" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="dropoff-location">Dropoff Location</label>
                <input type="text" id="dropoff-location" name="dropoff" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="pickup-date">Pickup Date</label>
                <!-- <input type="date" id="pickup-date" name="pickupdate" class="form-control" min="{{today}}" required> -->
                <input type="date" id="pickup-date" name="pickupdate" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="dropoff-date">Dropoff Date</label>
                <!-- <input type="date" id="dropoff-date" name="dropoffdate" class="form-control" min="{{today}}" required> -->
                <input type="date" id="dropoff-date" name="dropoffdate" class="form-control" required>

            </div>
            <!-- <script>
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('pickup-date').setAttribute('min', today);
                document.getElementById('dropoff-date').setAttribute('min', today);
            </script> -->
            <div class="form-group">
                <label for="car-type">Car Type</label>
                <select id="car-type" name="type" class="form-control" required>
                    <option value="Compact">Compact</option>
                    <option value="Electric">Electric</option>
                    <option value="Cabrio">Cabrio</option>
                    <option value="Racer">Racer</option>
                </select>
            </div>
            <div class="form-group">
                <label for="age">Driver's Age</label>
                <input type="number" id="age" name="age" class="form-control" min="18" required>
            </div>
            <div class="form-group">
                <label for="license-years">Driver's License Duration (years)</label>
                <input type="number" id="license-years" name="licenseYears" class="form-control" min="0" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Search</button>
        </form>
    </div>
</div>
</body>
</html>
